# pixel 6 monocular model

Camera:
  name: "pixel 6 monocular"
  setup: "monocular"
  model: "perspective"

  fx: 458.689067267
  fy: 342.672984824
  cx: 319.921568627
  cy: 179.94140625

  k1: 0.11605777882284728
  k2: -0.63063058456001864
  p1: 0.0
  p2: 0.0
  k3: 0.50505050522236195

  fps: 30.0
  cols: 640
  rows: 360

  color_order: "Gray"

Preprocessing:
  min_size: 800

Feature:
  name: "default ORB feature extraction setting"
  scale_factor: 1.2
  num_levels: 8
  ini_fast_threshold: 20
  min_fast_threshold: 7

Mapping:
  backend: "g2o"
  baseline_dist_thr_ratio: 0.02
  redundant_obs_ratio_thr: 0.9
  num_covisibilities_for_landmark_generation: 20
  num_covisibilities_for_landmark_fusion: 20
  erase_temporal_keyframes: false
  num_temporal_keyframes: 15

Initializer:
  min_num_valid_pts: 15
  min_num_triangulated_pts: 15
  verbose: false
  gain_threshold: 1e-5
  use_fixed_seed: false
  scaling_factor: 1.0
  num_ba_iterations: 100
  num_ransac_iterations: 100
  parallax_deg_threshold: 1.0
  reprojection_error_threshold: 4.0

Tracking:
  backend: "g2o"
  enable_temporal_keyframe_only_tracking: true

KeyframeInserter:
  wait_for_local_bundle_adjustment: false

Relocalizer:
  search_neighbor: true

LoopDetector:
  backend: "g2o"

System:
  map_format: "msgpack"
  num_grid_cols: 47
  num_grid_rows: 30

PangolinViewer:
  keyframe_size: 0.07
  keyframe_line_width: 1
  graph_line_width: 1
  point_size: 2
  camera_size: 0.08
  camera_line_width: 3
  viewpoint_x: 0
  viewpoint_y: -0.65
  viewpoint_z: -1.9
  viewpoint_f: 400
